apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "timestamp-formatter-connector.fullname" . }}-test-connection"
  labels:
    {{- include "timestamp-formatter-connector.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: curl
      image: {{ include "timestamp-formatter-connector.curl.image" . }}
      command:
        - /bin/sh
        - -c
        - |
          curl --silent --retry 5 --retry-delay 5 --retry-all-errors timestamp-formatter-connector-service:{{ .Values.service.port }}/v1
  restartPolicy: Never
